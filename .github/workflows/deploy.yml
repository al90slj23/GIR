name: Deploy to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload PHP site to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_WEB_DIR: ${{ secrets.FTP_WEB_DIR || 'Web' }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL || 'http://gir.likeheng.com' }}
          APP_TRIGGER_TOKEN: ${{ secrets.APP_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${FTP_HOST}" ] || [ -z "${FTP_USER}" ] || [ -z "${FTP_PASSWORD}" ]; then
            echo "Missing FTP secrets" >&2
            exit 1
          fi

          upload() {
            local src="$1"
            local dst="$2"
            echo "Uploading ${src} -> ${dst}"
            curl --fail --silent --show-error --ftp-pasv --ftp-create-dirs \
              --connect-timeout 30 \
              --max-time 120 \
              --retry 5 \
              --retry-delay 10 \
              --retry-all-errors \
              --user "${FTP_USER}:${FTP_PASSWORD}" \
              --upload-file "${src}" \
              "ftp://${FTP_HOST}/${FTP_WEB_DIR}/${dst}"
          }

          upload public/index.php index.php
          upload public/weekly.php weekly.php
          upload public/project.php project.php
          upload public/rss.php rss.php
          upload public/_layout.php public/_layout.php
          upload public/assets/app.css assets/app.css

          upload admin/index.php admin/index.php
          upload admin/discovery.php admin/discovery.php
          upload admin/projects.php admin/projects.php
          upload admin/settings.php admin/settings.php
          upload admin/stats.php admin/stats.php

          upload api/discover_config.php api/discover_config.php
          upload api/backfill_projects.php api/backfill_projects.php
          upload api/install_schema.php api/install_schema.php
          upload api/project_history.php api/project_history.php
          upload api/progress.php api/progress.php
          upload api/receive_projects.php api/receive_projects.php
          upload api/reset_analyses.php api/reset_analyses.php
          upload api/stats.php api/stats.php
          upload api/trigger_run.php api/trigger_run.php

          upload config/config.php config/config.php

          upload lib/auth.php lib/auth.php
          upload lib/bootstrap.php lib/bootstrap.php
          upload lib/db.php lib/db.php
          upload lib/helpers.php lib/helpers.php
          upload lib/repositories.php lib/repositories.php

          upload database/schema.sql database/schema.sql

          if [ -n "${APP_TRIGGER_TOKEN}" ]; then
            echo "Running schema installer"
            curl --fail --silent --show-error \
              --connect-timeout 20 \
              --max-time 60 \
              --retry 3 \
              --retry-delay 5 \
              "${APP_BASE_URL%/}/api/install_schema.php?token=${APP_TRIGGER_TOKEN}"
          fi
