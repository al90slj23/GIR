name: Discover GitHub Projects

on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "30 1 * * 1"
  workflow_dispatch:
    inputs:
      run_type:
        description: "daily, weekly, or manual"
        required: false
        default: "manual"

jobs:
  discover:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: actions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Discover and analyze projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          APP_INGEST_URL: ${{ secrets.APP_INGEST_URL }}
          APP_INGEST_TOKEN: ${{ secrets.APP_INGEST_TOKEN }}
          RUN_TYPE: ${{ github.event.inputs.run_type || (github.event.schedule == '30 1 * * 1' && 'weekly') || 'daily' }}
          MAX_PROJECTS: "10"
        run: node discover.js
