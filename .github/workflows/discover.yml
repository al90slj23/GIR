name: Discover GitHub Projects

on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "30 1 * * 1"
  workflow_dispatch:
    inputs:
      run_type:
        description: "daily, weekly, or manual"
        required: false
        default: "manual"
      seed_mode:
        description: "true 时使用扩大抓取面给数据库打底"
        required: false
        default: "false"
      platforms:
        description: "可选：只运行指定平台，逗号分隔，例如 github_search"
        required: false
        default: ""
      search_offset:
        description: "GitHub Search 补跑起始序号，从 0 开始"
        required: false
        default: "0"
      search_limit:
        description: "GitHub Search 本次最多跑多少条搜索规则，留空为全部"
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: actions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Discover and analyze projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          GIR_GITHUB_SEARCH_TOKEN: ${{ secrets.GIR_GITHUB_SEARCH_TOKEN }}
          APP_INGEST_URL: ${{ secrets.APP_INGEST_URL }}
          APP_INGEST_TOKEN: ${{ secrets.APP_INGEST_TOKEN }}
          RUN_TYPE: ${{ github.event.inputs.run_type || (github.event.schedule == '30 1 * * 1' && 'weekly') || 'daily' }}
          SEED_MODE: ${{ github.event.inputs.seed_mode || 'false' }}
          DISCOVER_PLATFORMS: ${{ github.event.inputs.platforms || '' }}
          GITHUB_SEARCH_SPEC_OFFSET: ${{ github.event.inputs.search_offset || '0' }}
          GITHUB_SEARCH_SPEC_LIMIT: ${{ github.event.inputs.search_limit || '' }}
          MAX_PROJECTS: "3"
          INGEST_BATCH_SIZE: "1"
          RAW_INGEST_BATCH_SIZE: "25"
          ANALYSIS_INGEST_BATCH_SIZE: "10"
          REQUEST_DELAY_MS: "1200"
          INGEST_DELAY_MS: "1500"
          GITHUB_SEARCH_DELAY_MS: "5000"
          GITHUB_RATE_LIMIT_RETRIES: "2"
          GITHUB_MAX_RATE_LIMIT_WAIT_MS: "60000"
        run: node discover.js
